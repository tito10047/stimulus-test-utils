name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run npm publish in dry-run mode (no actual publish)'
        required: false
        default: 'true'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npx vitest run

      - name: Build package
        run: npm run build

      - name: Pack (preview package contents)
        run: npm pack --dry-run

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: |
            dist
            package.json
            README.md
            LICENSE
            public_api.md

      - name: Publish to npm
        if: ${{ github.event_name != 'workflow_dispatch' }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run == 'true' }}
        run: npm publish --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm (manual real)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run != 'true' }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
